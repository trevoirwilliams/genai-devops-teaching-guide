name: PR Diff AI Analysis

on:
  # pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-diff-ai-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze-pr-diff:
    name: Analyze PR Diff
    runs-on: ubuntu-latest
    outputs:
      overall-risk: ${{ steps.extract.outputs.overall_risk }}
      confidence: ${{ steps.extract.outputs.confidence }}
      summary: ${{ steps.extract.outputs.summary }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build PR diff
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
            git diff --unified=3 --minimal "origin/${{ github.base_ref }}...${{ github.sha }}" > artifacts/pr.diff
          else
            git diff --unified=3 --minimal HEAD~1...HEAD > artifacts/pr.diff
          fi

          if [ ! -s artifacts/pr.diff ]; then
            echo "No diff detected; writing placeholder."
            echo "# empty diff" > artifacts/pr.diff
          fi

      - name: Run PRCodeQualityAgent
        id: agent
        shell: bash
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
        run: |
          set -euo pipefail
          dotnet run --file ai/agents/PRCodeQualityAgent.cs -- ./artifacts/pr.diff > ./artifacts/pr-analysis.json
          jq . ./artifacts/pr-analysis.json > /dev/null

      - name: Extract analysis outputs
        id: extract
        shell: bash
        run: |
          set -euo pipefail
          overall_risk=$(jq -r '.overallRisk // "unknown"' ./artifacts/pr-analysis.json)
          confidence=$(jq -r '.confidence // 0' ./artifacts/pr-analysis.json)
          summary=$(jq -r '.summary // ""' ./artifacts/pr-analysis.json)

          {
            echo "overall_risk=$overall_risk"
            echo "confidence=$confidence"
            echo "summary<<EOF"
            echo "$summary"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload analysis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pr-diff-ai-analysis
          path: |
            artifacts/pr.diff
            artifacts/pr-analysis.json
          if-no-files-found: error

      - name: Upsert PR comment
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const marker = '<!-- pr-diff-ai-analysis -->';
            const bodyJson = fs.readFileSync('artifacts/pr-analysis.json', 'utf8');
            const body = [
              marker,
              '## AI PR Diff Analysis',
              '',
              '```json',
              bodyJson,
              '```'
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

  risk-gate:
    name: Risk Gate
    runs-on: ubuntu-latest
    needs: analyze-pr-diff
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Fail on high-risk findings
        shell: bash
        run: |
          set -euo pipefail

          risk="${{ needs.analyze-pr-diff.outputs.overall-risk }}"
          confidence_raw="${{ needs.analyze-pr-diff.outputs.confidence }}"

          if [[ "$confidence_raw" =~ ^[0-9]+(\.[0-9]+)?$ ]]; then
            confidence="$confidence_raw"
          else
            confidence="0"
            echo "Confidence was missing or non-numeric; defaulting to 0."
          fi

          threshold="0.70"

          if [ "$risk" = "high" ] && awk -v c="$confidence" -v t="$threshold" 'BEGIN { exit (c >= t) ? 0 : 1 }'; then
            echo "High risk changes detected with confidence=$confidence (threshold=$threshold)."
            exit 1
          fi

          echo "Risk gate passed with risk='$risk' confidence='$confidence' threshold='$threshold'."
