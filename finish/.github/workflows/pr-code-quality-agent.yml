name: PR Code Quality Agent (MCP)

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  analyze_pr_with_mcp:
    runs-on: ubuntu-latest

    env:
      AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}

      PR_ANALYSIS_TOKEN: ${{ secrets.PR_ANALYSIS_TOKEN }}

      MCP_PR_OWNER: ${{ github.repository_owner }}
      MCP_PR_REPO: ${{ github.event.repository.name }}
      MCP_PR_NUMBER: ${{ github.event.pull_request.number }}
      MCP_SERVER_PROJECT: mcp/DevOps.McpServer

      # Gate can be: low, medium, or high
      PR_RISK_GATE: high

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Create artifacts folder
        run: mkdir -p artifacts

      - name: Run PR Code Quality Agent via MCP
        shell: bash
        run: |
          set -euo pipefail
          dotnet run --file ai/agents/PRCodeQualityAgent.cs > artifacts/pr-analysis.json

      - name: Validate agent JSON output exists
        shell: bash
        run: |
          set -euo pipefail
          test -f artifacts/pr-analysis.json
          cat artifacts/pr-analysis.json

      - name: Upsert PR analysis comment and evaluate risk gate
        id: pr_comment_and_gate
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const marker = '<!-- pr-code-quality-agent-comment -->';
            const raw = fs.readFileSync('artifacts/pr-analysis.json', 'utf8');
            const data = JSON.parse(raw);

            const summary = data.summary ?? 'No summary provided.';
            const overallRisk = (data.overallRisk ?? 'unknown').toLowerCase();
            const confidence = data.confidence ?? 0;
            const issues = Array.isArray(data.issues) ? data.issues : [];
            const missingTests = Array.isArray(data.missingTests) ? data.missingTests : [];

            function escapeMd(text) {
              return String(text ?? '')
                .replace(/\\/g, '\\\\')
                .replace(/\|/g, '\\|')
                .replace(/`/g, '\\`');
            }

            let body = `${marker}
            ## PR Code Quality Analysis

            **Overall Risk:** \`${escapeMd(overallRisk)}\`  
            **Confidence:** \`${escapeMd(confidence)}\`

            ### Summary
            ${summary}
            `;

            if (issues.length > 0) {
              body += `
            ### Issues

            | Severity | Category | File | Line | Description | Suggested Fix |
            |---|---|---|---:|---|---|
            `;
              for (const issue of issues) {
                body += `| ${escapeMd(issue.severity)} | ${escapeMd(issue.category)} | ${escapeMd(issue.file)} | ${issue.line ?? 0} | ${escapeMd(issue.description)} | ${escapeMd(issue.suggestedFix)} |\n`;
              }
            } else {
              body += `
            ### Issues

            No significant issues were reported.
            `;
            }

            if (missingTests.length > 0) {
              body += `
            ### Missing / Recommended Tests
            `;
              for (const test of missingTests) {
                body += `\n- ${escapeMd(test)}`;
              }
              body += '\n';
            }

            body += `
            ---
            _Generated by PRCodeQualityAgent using MCP-backed GitHub retrieval._
            `;

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            // Upsert existing bot comment instead of creating a new one every run.
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find(comment =>
              comment.user?.type === 'Bot' &&
              typeof comment.body === 'string' &&
              comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
              core.info(`Updated existing PR analysis comment: ${existing.id}`);
            } else {
              const created = await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
              core.info(`Created PR analysis comment: ${created.data.id}`);
            }

            // Risk gate
            const gate = String(process.env.PR_RISK_GATE || 'high').toLowerCase();
            const order = { low: 1, medium: 2, high: 3 };

            if (!order[gate]) {
              core.setFailed(`Invalid PR_RISK_GATE value: ${gate}`);
              return;
            }

            const overallRiskRank = order[overallRisk] || 0;
            const blockingIssue = issues.some(i => {
              const sev = String(i.severity || '').toLowerCase();
              return order[sev] && order[sev] >= order[gate];
            });

            const shouldFail = overallRiskRank >= order[gate] || blockingIssue;

            core.setOutput('overall_risk', overallRisk);
            core.setOutput('should_fail', shouldFail ? 'true' : 'false');

            if (shouldFail) {
              core.setFailed(`PR blocked by risk gate. overallRisk=${overallRisk}, threshold=${gate}`);
            } else {
              core.info(`Risk gate passed. overallRisk=${overallRisk}, threshold=${gate}`);
            }

      - name: Upload PR analysis artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pr-analysis-artifacts
          path: artifacts/
          if-no-files-found: warn