name: AI ChatOps Assistant - With Memory

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  ai-chatops:
    if: github.event.issue.pull_request && contains(github.event.comment.body, '@bot')
    runs-on: ubuntu-latest
    environment:
      name: devops-dev

    steps:
      - uses: actions/checkout@v4

      - name: Extract PR metadata
        id: pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const report = {
              number: pr.number,
              title: pr.title,
              body: pr.body,
              author: pr.user.login,
              labels: pr.labels.map(l => l.name),
              changed_files: pr.changed_files
            };

            require('fs').writeFileSync(
              'chatops-pr.json',
              JSON.stringify(report, null, 2)
            );

      - name: Extract user command
        id: cmd
        shell: bash
        run: |
          set -euo pipefail
          # Keep the raw comment text, but remove the @bot mention.
          # Treat as untrusted; the system prompt already instructs how to handle it.
          COMMENT_BODY="${{ github.event.comment.body }}"
          CLEANED="$(printf "%s" "$COMMENT_BODY" | sed 's/@bot//g' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          jq -n --arg command "$CLEANED" '{ user_command: $command }' > chatops-command.json

      - name: Load durable memory
        id: mem
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_CHATOPS_TOKEN }}
          script: |
            const fs = require('fs');

            const memoryIssueNumber = Number(process.env.CHATOPS_MEMORY_ISSUE_NUMBER || "0");
            const maxItems = Number(process.env.CHATOPS_MEMORY_MAX_ITEMS || "10");

            if (!memoryIssueNumber) {
              fs.writeFileSync('chatops-memory.json', JSON.stringify({ memory: [] }, null, 2));
              core.info("No CHATOPS_MEMORY_ISSUE_NUMBER set; memory disabled.");
              return;
            }

            // Fetch comments from the memory ledger issue
            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: memoryIssueNumber,
                per_page: 100
              }
            );

            // We expect memory comments to contain JSON blocks; we’ll parse conservatively.
            // We’ll take the most recent valid entries.
            const memories = [];
            const jsonBlockRegex = /```json\s*([\s\S]*?)\s*```/g;

            for (let i = comments.length - 1; i >= 0; i--) {
              const body = comments[i].body || "";
              let match;
              while ((match = jsonBlockRegex.exec(body)) !== null) {
                try {
                  const parsed = JSON.parse(match[1]);
                  if (parsed && typeof parsed === "object") {
                    memories.push(parsed);
                  }
                } catch {
                  // ignore invalid blocks
                }
              }
              if (memories.length >= maxItems) break;
            }

            fs.writeFileSync('chatops-memory.json', JSON.stringify({ memory: memories }, null, 2));
            core.info(`Loaded ${memories.length} memory item(s).`);
        env:
          CHATOPS_MEMORY_ISSUE_NUMBER: ${{ vars.CHATOPS_MEMORY_ISSUE_NUMBER }}
          CHATOPS_MEMORY_MAX_ITEMS: ${{ vars.CHATOPS_MEMORY_MAX_ITEMS }}
      - name: Build ChatOps input
        shell: bash
        run: |
          set -euo pipefail

          for f in chatops-pr.json chatops-command.json chatops-memory.json; do
            if [ ! -f "$f" ]; then
              echo "Required input file missing: $f"
              echo "Workspace files:"
              ls -la
              exit 1
            fi
          done

          jq -s '.[0] + .[1] + .[2]' chatops-pr.json chatops-command.json chatops-memory.json > chatops-input.json

 
      - name: Generate AI response
        id: ai
        uses: ./.github/azure-openai-chat
        with:
          endpoint: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          api_key: ${{ secrets.AZURE_OPENAI_API_KEY }}
          deployment: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          system_prompt_file: "ai/prompts/chatops.memory.prompt.md"
          user_input_file: "chatops-input.json"
          output_file: "chatops-output.md"
          temperature: "0.1"

      - name: Extract memory writes
        id: extract_mem
        shell: bash
        run: |
          set -euo pipefail

          # Extract the LAST ```json ...``` block from the output.
          # If missing or invalid, fall back to an empty memory_writes payload.
          if awk '
            BEGIN { inblock=0; block=""; }
            /^```json/ { inblock=1; block=""; next }
            /^```/ && inblock==1 { inblock=0; last=block; next }
            { if (inblock==1) block = block $0 "\n" }
            END { if (length(last)==0) exit 2; print last }
          ' chatops-output.md > memory-candidate.json; then
            if ! jq -e '.memory_writes and (.memory_writes | type=="array")' memory-candidate.json >/dev/null; then
              echo 'Extracted JSON did not contain memory_writes array; using empty fallback.'
              jq -n '{ memory_writes: [] }' > memory-candidate.json
            fi
          else
            echo 'No fenced JSON memory block found; using empty fallback.'
            jq -n '{ memory_writes: [] }' > memory-candidate.json
          fi

          # Output a compact version for later steps
          jq -c '.' memory-candidate.json > memory-candidate.compact.json

      - name: Validate and write memory
        id: write_mem
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_CHATOPS_TOKEN }}
          script: |
            const fs = require('fs');

            const memoryIssueNumber = Number(process.env.CHATOPS_MEMORY_ISSUE_NUMBER || "0");
            const maxChars = Number(process.env.CHATOPS_MEMORY_MAX_CHARS || "800");
            if (!memoryIssueNumber) {
              core.info("Memory ledger not configured; skipping write.");
              return;
            }

            const raw = fs.readFileSync('memory-candidate.json', 'utf8');
            const payload = JSON.parse(raw);
            const writes = payload.memory_writes || [];

            // Hard denylist for common secret markers (lightweight but effective for demo).
            const denyPatterns = [
              /api[_-]?key/i,
              /secret/i,
              /token/i,
              /password/i,
              /connection\s*string/i,
              /-----BEGIN/i
            ];

            // Allow only these fields
            function isValidWrite(w) {
              if (!w || typeof w !== 'object') return false;
              const allowedKeys = ['type','key','value','scope','reason'];
              for (const k of Object.keys(w)) if (!allowedKeys.includes(k)) return false;

              if (typeof w.type !== 'string' || !['preference','convention','preference|convention'].includes(w.type)) return false;
              if (typeof w.key !== 'string' || w.key.length < 3 || w.key.length > 64) return false;
              if (typeof w.value !== 'string' || w.value.length < 1 || w.value.length > maxChars) return false;
              if (typeof w.scope !== 'string' || w.scope !== 'repo') return false;
              if (typeof w.reason !== 'string' || w.reason.length < 3 || w.reason.length > 200) return false;

              const combined = `${w.key}\n${w.value}\n${w.reason}`;
              return !denyPatterns.some(rx => rx.test(combined));
            }

            const safeWrites = writes.filter(isValidWrite);

            if (safeWrites.length === 0) {
              core.info("No safe memory writes detected.");
              return;
            }

            const toStore = {
              stored_at_utc: new Date().toISOString(),
              pr: {
                number: context.payload.issue.number
              },
              memory_writes: safeWrites
            };

            const body =
              `### Memory Update\n` +
              `Source PR: #${context.payload.issue.number}\n\n` +
              "```json\n" +
              JSON.stringify(toStore, null, 2) +
              "\n```";

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: memoryIssueNumber,
              body
            });

            core.info(`Stored ${safeWrites.length} memory item(s).`);
        env:
          CHATOPS_MEMORY_ISSUE_NUMBER: ${{ vars.CHATOPS_MEMORY_ISSUE_NUMBER }}
          CHATOPS_MEMORY_MAX_CHARS: ${{ vars.CHATOPS_MEMORY_MAX_CHARS }}

      - name: Post response to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_CHATOPS_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('chatops-output.md', 'utf8');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `🤖 AI Assistant Response:\n\n${body}`
            });