name: CI (with Agent Failure Triage)

on:
  workflow_dispatch:
  # pull_request:

jobs:
  build_test_triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Run tests (capture log)
        id: tests
        continue-on-error: true
        run: |
          set -o pipefail
          mkdir -p artifacts
          dotnet test src/GenAIDevOps.sln --configuration Release 2>&1 | tee artifacts/failure.log

      - name: Run agent triage (analyze failure.log)
        if: ${{ steps.tests.outcome == 'failure' }}
        run: |
          dotnet run --file ai/agents/DevOpsFailureTriageAgent.cs -- ./artifacts/failure.log
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}

      - name: Upload triage artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts
          path: artifacts/
          if-no-files-found: warn

      - name: Fail job if tests failed
        if: ${{ steps.tests.outcome == 'failure' }}
        run: exit 1